<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOSEPH | Grow Your Instagram</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #111111;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --neon-purple: #b026ff;
            --neon-blue: #00f0ff;
            --price-gold: #ffd700;
            --gradient: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
            --error-color: #ff4757;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- Animations --- */
        @keyframes glow {
            0% { box-shadow: 0 0 5px rgba(176, 38, 255, 0.2); }
            50% { box-shadow: 0 0 20px rgba(176, 38, 255, 0.6); }
            100% { box-shadow: 0 0 5px rgba(176, 38, 255, 0.2); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Header --- */
        header {
            padding: 20px 5%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            text-decoration: none;
        }

        /* --- Hero Section --- */
        #hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            position: relative;
            background: radial-gradient(circle at center, rgba(176, 38, 255, 0.1) 0%, rgba(5, 5, 5, 1) 70%);
        }

        #hero h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            line-height: 1.1;
            font-weight: 800;
        }

        #hero h1 span {
            color: var(--neon-blue);
        }

        #hero p {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .cta-btn {
            background: var(--gradient);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .cta-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(176, 38, 255, 0.5);
        }

        /* --- Order Section --- */
        #order {
            padding: 80px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #050505, #0a0a0a);
        }

        .form-container {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            animation: fadeIn 0.8s ease-out;
        }

        .form-container::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: var(--gradient);
            z-index: -1;
            border-radius: 22px;
            opacity: 0.3;
            filter: blur(10px);
        }

        .form-title {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 14px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .input-group input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
        }

        .helper-text {
            font-size: 0.8rem;
            color: #555;
            margin-top: 5px;
            display: block;
        }

        .error-msg {
            color: var(--error-color);
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
            align-items: center;
            gap: 5px;
            font-weight: 500;
        }

        .error-msg.visible {
            display: flex;
        }

        /* Package Selection */
        .package-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .package-option {
            position: relative;
        }

        .package-option input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        .package-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #333;
            padding: 20px 15px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            position: relative;
            z-index: 1;
        }

        .package-option input:checked + .package-card {
            background: rgba(176, 38, 255, 0.15);
            border-color: var(--neon-purple);
            box-shadow: 0 0 20px rgba(176, 38, 255, 0.4);
            transform: translateY(-2px);
        }

        .pkg-number {
            font-size: 1.6rem;
            font-weight: 800;
            color: white;
            line-height: 1;
            margin-bottom: 4px;
        }

        .pkg-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .pkg-divider {
            width: 30px;
            height: 2px;
            background: #333;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .package-option input:checked + .package-card .pkg-divider {
            background: var(--neon-purple);
        }

        .pkg-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--price-gold);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--gradient);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            box-shadow: 0 0 20px rgba(176, 38, 255, 0.6);
        }

        .submit-btn:disabled {
            background: #333;
            cursor: not-allowed;
            color: #777;
            box-shadow: none;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #555;
            font-size: 0.9rem;
            border-top: 1px solid #111;
        }

        /* Responsive */
        @media (max-width: 600px) {
            #hero h1 { font-size: 2.5rem; }
            .form-container { padding: 25px; }
            .package-grid { grid-template-columns: 1fr; }
        }
        #pi{
            position: relative;
            left: 40px;
            font-size: 30px;
        }
     
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <a href="#" class="logo">JOSEPH</a>
    </header>

    <!-- Hero Section -->
    <section id="hero">
        <h1>Grow Your Instagram <span>Fast 🚀</span></h1>
        <p>Real growth. Real results. Unlock your potential today.</p>
        <a href="#order" class="cta-btn">Start Order</a>
    </section>

    <!-- Order Form Section -->
    <section id="order">
        <div class="form-container">
            <h2 class="form-title">Select Your Plan</h2>
            
            <form id="orderForm" action="#" method="POST" onsubmit="processOrder(event)">
                
                <!-- Full Name -->
                <div class="input-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" name="name" placeholder="John Doe" required>
                </div>

                <!-- Email -->
                <div class="input-group">
                    <label for="email">Your Email</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required>
                </div>

                <!-- Phone Number (NEW) -->
                <div class="input-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="+251 911..." required>
                </div>

                <!-- Instagram Username (REQUIRED) -->
                <div class="input-group">
                    <label for="username">Instagram Username</label>
                    <input type="text" id="username" name="username" placeholder="@username" required>
                    <span class="helper-text">Example: @john_doe</span>
                    <div id="username-error" class="error-msg">
                        <i class="fas fa-exclamation-circle"></i> Instagram username is required!
                    </div>
                </div>

                <!-- Followers Package with Pricing -->
                <div class="input-group">
                    <label>Packages</label>
                    <div class="package-grid">
                        
                        <!-- 100 FOLLOWERS = 50ETB -->
                        <label class="package-option">
                            <input type="radio" name="followers" value="100" checked>
                            <div class="package-card">
                                <div class="pkg-number">100</div>
                                <div class="pkg-label">FOLLOWERS</div>
                                <div class="pkg-divider"></div>
                                <div class="pkg-price">50 ETB</div>
                            </div>
                        </label>

                        <!-- 500 FOLLOWERS = 250ETB -->
                        <label class="package-option">
                            <input type="radio" name="followers" value="500">
                            <div class="package-card">
                                <div class="pkg-number">500</div>
                                <div class="pkg-label">FOLLOWERS</div>
                                <div class="pkg-divider"></div>
                                <div class="pkg-price">250 ETB</div>
                            </div>
                        </label>

                        <!-- 1,000 FOLLOWERS = 500ETB -->
                        <label class="package-option">
                            <input type="radio" name="followers" value="1000">
                            <div class="package-card">
                                <div class="pkg-number">1,000</div>
                                <div class="pkg-label">FOLLOWERS</div>
                                <div class="pkg-divider"></div>
                                <div class="pkg-price">500 ETB</div>
                            </div>
                        </label>

                        <!-- 5,000 FOLLOWERS = 2,500ETB -->
                        <label class="package-option">
                            <input type="radio" name="followers" value="5000">
                            <div class="package-card">
                                <div class="pkg-number">5,000</div>
                                <div class="pkg-label">FOLLOWERS</div>
                                <div class="pkg-divider"></div>
                                <div class="pkg-price">2,500 ETB</div>
                            </div>
                        </label>

                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="submit-btn" id="submitBtn">Place Order</button>
            </form>
        </div>
    </section>
   

    <!-- Footer -->
    <footer>
        &copy; 2026 JOSEPH. All rights reserved. <br>
        <br>
        <a href="pay.html" id="pi">Payment Info</a>
  
    </footer>

    <!-- JavaScript Logic -->
    <script>
        function processOrder(event) {
            // 1. Stop the page from reloading
            event.preventDefault();

            // 2. Get Form Elements
            const usernameInput = document.getElementById("username");
            const errorDiv = document.getElementById("username-error");
            const submitBtn = document.getElementById("submitBtn");
            
            const name = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value; // Get Phone Number
            let username = usernameInput.value.trim();
            const packageValue = document.querySelector('input[name="followers"]:checked').value;

            // 3. Validation: Check if username is empty
            if (username === "") {
                errorDiv.classList.add("visible");
                usernameInput.style.borderColor = "var(--error-color)";
                
                // Shake animation for feedback
                usernameInput.parentElement.animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(-5px)' },
                    { transform: 'translateX(5px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 300 });
                
                return; // Stop here if error
            } else {
                errorDiv.classList.remove("visible");
                usernameInput.style.borderColor = "#333";
            }

            // 4. Auto-add @ if missing
            if (!username.startsWith("@")) {
                usernameInput.value = "@" + username;
                username = "@" + username;
            }

            // 5. Determine Price
            let price = "";
            switch(packageValue) {
                case "100": price = "50 ETB"; break;
                case "500": price = "250 ETB"; break;
                case "1000": price = "500 ETB"; break;
                case "5000": price = "2,500 ETB"; break;
            }

            // 6. Construct the Mailto Link
            // %0D%0A is the standard code for a new line in email bodies
            const recipient = "yosefgeni@gmail.com";
            const subject = "New Order - JOSEPH";
            const body = `New Order Details:%0D%0A%0D%0AName: ${name}%0D%0AEmail: ${email}%0D%0APhone: ${phone}%0D%0AInstagram: ${username}%0D%0APackage: ${packageValue} Followers%0D%0APrice: ${price}`;

            const mailtoLink = `mailto:${recipient}?subject=${encodeURIComponent(subject)}&body=${body}`;

            // 7. Execute the link (REAL mailto)
            window.location.href = mailtoLink;
        }

        // Clear error when user types
        document.getElementById("username").addEventListener("input", function() {
            let errorDiv = document.getElementById("username-error");
            if (this.value.trim() !== "") {
                errorDiv.classList.remove("visible");
                this.style.borderColor = "#333";
            }
        });
    </script>

</body>
</html>
